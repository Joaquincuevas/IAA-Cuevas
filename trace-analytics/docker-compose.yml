services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MAX_WORKERS: ${GROQ_MAX_WORKERS:-2}
      DATA_PATH: /data/RA_UandesFunctional.xlsx
      APP_DB: /data/app.db
    volumes:
      - ./data:/data     # read-write: Excel (read) + app.db (read-write)

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000